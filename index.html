<!doctype html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PenguinFlix - Twój Dziennik Filmowy</title>
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
  <link rel="preconnect" href="https://api.themoviedb.org" crossorigin />
  <link rel="icon" type="image/png" href="icon-192.png">

  <meta name="theme-color" content="#101114" id="theme-color-meta" />
  <meta name="color-scheme" content="dark" id="color-scheme-meta" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Podpięcie zewnętrznego pliku CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="display: none"
    id="force-light-mode-hack" />
  <!-- PULL TO REFRESH -->
  <div id="ptr-container">
    <svg id="ptr-spinner" viewBox="0 0 24 24">
      <path
        d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z" />
    </svg>
  </div>

  <!-- SMART BACKUP ALERT -->
  <div id="smart-backup-container"></div>
  <div id="toast-container"></div>

  <header id="fixed-header">
    <div class="header-content">
      <svg class="app-logo-icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M401.7,144.2C382.4,106.6,343.3,80,299.7,80c-48.5,0-88.7,35.5-96.8,81.4c-42.5,0-76.8,34.4-76.8,76.8 c0,35.1,22.4,64.8,53.2,73.8c-7.3,4.4-15.6,6.9-24.4,6.9c-32.1,0-58.1,26-58.1,58.1h29.1c0-16,13-29.1,29.1-29.1 s29.1,13,29.1,29.1h29.1h29.1h29.1c0-16,13-29.1,29.1-29.1s29.1,13,29.1,29.1h29.1c0-32.1-26-58.1-58.1-58.1 c-8.8,0-17.1,2.5-24.4-6.9c30.8-9,53.2-38.7,53.2-73.8C478.5,178.6,444.2,144.2,401.7,144.2z M241.6,220.3 c-12,0-21.8-9.8-21.8-21.8s9.8-21.8,21.8-21.8s21.8,9.8,21.8,21.8S253.6,220.3,241.6,220.3z M358.4,220.3 c-12,0-21.8-9.8-21.8-21.8s9.8-21.8,21.8-21.8s21.8,9.8,21.8,21.8S370.4,220.3,358.4,220.3z" />
      </svg>
      <div class="search-wrapper">
        <input type="search" id="searchInput" placeholder="Szukaj tytułu..." autocomplete="off" />
        <svg class="search-icon" viewBox="0 0 24 24">
          <path
            d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
        </svg>
        <!-- NOWY PRZYCISK X -->
        <button class="search-clear-btn" id="searchClearBtn" title="Wyczyść">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <button id="notification-bell-btn" class="icon-button" style="position: relative; margin-left: -8px">
        <svg viewBox="0 0 24 24" style="
              width: 24px;
              height: 24px;
              fill: none;
              stroke: var(--text-secondary);
              stroke-width: 2;
              stroke-linecap: round;
              stroke-linejoin: round;
            ">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span id="notification-badge" class="notification-badge"></span>
      </button>
    </div>
    <div id="searchResults"></div>
  </header>

  <div id="sub-header">
    <div class="segmented-control">
      <button class="seg-btn active" data-subtab="toWatch">
        Do obejrzenia
      </button>
      <button class="seg-btn" data-subtab="watched">Obejrzane</button>
    </div>
  </div>

  <main id="app">
    <div id="configSection"></div>
    <div id="mainContent" style="display: none; flex-grow: 1">
      <div id="tab-movies" class="main-tab-content active">
        <div class="list-toolbar">
          <div class="local-search-container">
            <svg class="local-search-icon" viewBox="0 0 24 24">
              <path
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <input type="text" class="localSearchInput" placeholder="Filtruj listę..." autocomplete="off" />
            <button class="clearLocalSearch" aria-label="Wyczyść filtrowanie" title="Wyczyść">
              <svg viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          <div class="view-controls">
            <button class="button icon-only btn-view-toggle" data-action="toggle-view" aria-label="Zmień widok"
              title="Zmień widok"></button>
            <button class="button btn-sort" data-action="open-sort-options">
              <svg viewBox="0 0 24 24">
                <path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z" />
              </svg><span class="hide-mobile-text">Sortuj</span>
            </button>
            <button class="button btn-filter" data-action="open-filter-options">
              <svg viewBox="0 0 24 24">
                <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z" />
              </svg><span class="hide-mobile-text">Filtruj</span>
            </button>
          </div>
        </div>
        <div id="moviesToWatchListContainer" class="list-container active"></div>
        <div id="moviesWatchedListContainer" class="list-container"></div>
      </div>

      <div id="tab-series" class="main-tab-content">
        <div class="list-toolbar">
          <div class="local-search-container">
            <svg class="local-search-icon" viewBox="0 0 24 24">
              <path
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <input type="text" class="localSearchInput" placeholder="Filtruj listę..." autocomplete="off" />
            <button class="clearLocalSearch" aria-label="Wyczyść filtrowanie" title="Wyczyść">
              <svg viewBox="0 0 24 24">
                <path
                  d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
              </svg>
            </button>
          </div>
          <div class="view-controls">
            <button class="button icon-only btn-view-toggle" data-action="toggle-view" aria-label="Zmień widok"
              title="Zmień widok"></button>
            <button class="button btn-sort" data-action="open-sort-options">
              <svg viewBox="0 0 24 24">
                <path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z" />
              </svg><span class="hide-mobile-text">Sortuj</span>
            </button>
            <button class="button btn-filter" data-action="open-filter-options">
              <svg viewBox="0 0 24 24">
                <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z" />
              </svg><span class="hide-mobile-text">Filtruj</span>
            </button>
          </div>
        </div>
        <div id="seriesToWatchListContainer" class="list-container active"></div>
        <div id="seriesWatchedListContainer" class="list-container"></div>
      </div>

      <div id="tab-discover" class="main-tab-content">
               <div class="discover-sticky-header">
            <!-- PASEK PIERWSZY: TRENDY / W KINACH -->
            <div class="discover-categories-wrapper">
                <div class="discover-categories" id="discover-categories">
                    <button class="discover-pill active" data-endpoint="trending">🔥 Trendy</button>
                    <button class="discover-pill" data-endpoint="movies_popular">🍿 Popularne Filmy</button>
                    <button class="discover-pill" data-endpoint="series_popular">📺 Popularne Seriale</button>
                    <button class="discover-pill" data-endpoint="in_theaters">🎬 W kinach</button>
                    <button class="discover-pill" data-endpoint="top_rated">⭐ Najwyżej oceniane</button>
                </div>
            </div>

            <!-- PASEK DRUGI: NASTROJE -->
            <div class="discover-categories-wrapper">
                <div class="discover-categories" id="discover-genres">
                    <span style="display:flex; align-items:center; padding-right:8px; font-weight:bold; color:var(--text-secondary); font-size:0.85rem;">Nastroje:</span>
                    <button class="discover-pill genre-pill" data-genre="28">💥 Akcja</button>
                    <button class="discover-pill genre-pill" data-genre="35">😂 Komedia</button>
                    <button class="discover-pill genre-pill" data-genre="27">👻 Horror</button>
                    <button class="discover-pill genre-pill" data-genre="878">👽 Sci-Fi</button>
                    <button class="discover-pill genre-pill" data-genre="53">🔪 Thriller</button>
                    <button class="discover-pill genre-pill" data-genre="10749">❤️ Romans</button>
                    <button class="discover-pill genre-pill" data-genre="16">🎨 Animacja</button>
                </div>
            </div>
            
            <!-- NOWOŚĆ: PASEK ROKU (Domyślnie schowany przez display:none) -->
            <div id="discover-year-container" style="display: none; padding: 0 16px 12px 16px; margin-top: -4px; animation: fadeIn 0.3s ease-out;">
                <div style="display: flex; align-items: center; background: color-mix(in srgb, var(--bg-color) 70%, rgba(0,0,0,0.2)); border-radius: var(--radius-pill); padding: 6px 16px; box-shadow: inset 0 2px 6px rgba(0,0,0,0.3); border: 1px solid transparent; width: 100%; max-width: 250px; transition: all 0.3s;" id="discover-year-wrapper">
                    <svg viewBox="0 0 24 24" style="width: 16px; height: 16px; fill: var(--text-secondary); margin-right: 10px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <input type="number" id="discover-year-input" placeholder="Wpisz rok (np. 1999)" autocomplete="off" style="flex-grow: 1; background: transparent; border: none; color: var(--text-color); font-size: 0.95rem; font-weight: 600; outline: none; padding: 4px 0; min-width: 0;">
                    <button id="discover-year-clear" style="background: transparent; border: none; color: var(--text-secondary); display: none; align-items: center; justify-content: center; cursor: pointer; padding: 4px; margin-left: 4px;"><svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;stroke-width:3;fill:none;stroke-linecap:round;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                </div>
            </div>
        </div>
        <div class="discover-grid" id="main-discover-grid"></div>
      </div>

      <div id="tab-profile" class="main-tab-content">
        <div class="profile-header">
          <svg class="avatar-icon" viewBox="0 0 24 24">
            <path
              d="M12,19.2C9.5,19.2 7.29,17.92 6,16C6.03,14 10,12.9 12,12.9C14,12.9 17.97,14 18,16C16.71,17.92 14.5,19.2 12,19.2M12,5A3,3 0 0,1 15,8A3,3 0 0,1 12,11A3,3 0 0,1 9,8A3,3 0 0,1 12,5M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z" />
          </svg>
          <h2>Witaj!</h2>
          <p>Twój filmowy pamiętnik</p>
        </div>

        <div class="profile-tabs-nav">
          <button class="ptab-btn active" data-ptab="stats">
            <svg viewBox="0 0 24 24" style="
                  width: 20px;
                  height: 20px;
                  stroke: currentColor;
                  fill: none;
                  stroke-width: 2;
                ">
              <path d="M18 20V10M12 20V4M6 20v-6" />
            </svg>
            Podsumowanie
          </button>
          <button class="ptab-btn" data-ptab="settings">
            <svg viewBox="0 0 24 24" style="
                  width: 20px;
                  height: 20px;
                  stroke: currentColor;
                  fill: none;
                  stroke-width: 2;
                ">
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
              </path>
            </svg>
            Ustawienia
          </button>
        </div>

        <div id="ptab-stats" class="profile-sub-section active">
          <div class="stats-grid" id="profile-stats-container"></div>
        </div>

        <div id="ptab-settings" class="profile-sub-section">
          <div class="settings-section">
            <div class="settings-section-title">Wygląd i działanie</div>
            <div class="settings-group">
              <button class="settings-item" id="btn-theme-toggle">
                <svg class="icon" viewBox="0 0 24 24">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <span class="text">Zmień motyw aplikacji</span>
                <svg class="chevron" viewBox="0 0 24 24">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>

              <label class="settings-item modern-toggle-row">
                <div style="display: flex; align-items: center; gap: 16px">
                  <svg class="icon" viewBox="0 0 24 24" style="
                        stroke: currentColor;
                        fill: none;
                        width: 24px;
                        height: 24px;
                      ">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                  </svg>
                  <span class="text">Wibracje</span>
                </div>

                <div class="toggle-switch">
                  <input type="checkbox" id="haptics-checkbox" />
                  <div class="slider"></div>
                </div>
              </label>
              <label class="settings-item modern-toggle-row">
                <div style="display: flex; align-items: center; gap: 16px">
                  <svg class="icon" viewBox="0 0 24 24">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                  </svg>
                  <div style="display: flex; flex-direction: column">
                    <span class="text">Panel powiadomień</span>
                  </div>
                </div>
                <div class="toggle-switch">
                  <input type="checkbox" id="smart-notifications-checkbox" />
                  <div class="slider"></div>
                </div>
              </label>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-section-title">Twoja Biblioteka</div>
            <div class="settings-group">
              <!-- WKLEJ TO W USTAWIENIACH BIBLIOTEKI -->
              <button class="settings-item" id="btn-backup-settings">
                <svg class="icon" viewBox="0 0 24 24">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span class="text">Przypomnij o backupie</span>
                <svg class="chevron" viewBox="0 0 24 24">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
              <button class="settings-item" id="btn-custom-add">
                <svg class="icon" viewBox="0 0 24 24">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span class="text">Dodaj tytuł ręcznie</span>
                <svg class="chevron" viewBox="0 0 24 24">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>

              <button class="settings-item" id="btn-backup">
                <svg class="icon" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span class="text">Eksportuj kopię zapasową</span>
                <svg class="chevron" viewBox="0 0 24 24">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>

              <label class="settings-item" for="restoreInput" style="cursor: pointer">
                <svg class="icon" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span class="text">Importuj kopię zapasową</span>
                <svg class="chevron" viewBox="0 0 24 24">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </label>
              <input type="file" id="restoreInput" accept=".json" style="display: none" />
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-section-title">Inne</div>
            <div class="settings-group">
              <!-- NOWY GUZIK: Aktualizacja Filmów (Kolekcje, Czas trwania) -->
              <button class="settings-item" id="btn-hard-refresh-movies">
                <svg class="icon" viewBox="0 0 24 24">
                  <path d="M21.5 2v6h-6M2.13 15.57a9 9 0 1 0 3.84-10.36L2 8"></path>
                </svg>
                <span class="text">Sprawdź integralność kolekcji</span>
                <svg class="chevron" viewBox="0 0 24 24">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
              <button class="settings-item" id="btn-hard-refresh">
                <svg class="icon" viewBox="0 0 24 24">
                  <path d="M21.5 2v6h-6M2.13 15.57a9 9 0 1 0 3.84-10.36L2 8"></path>
                </svg>
                <span class="text">Wymuś odświeżenie seriali</span>
                <svg class="chevron" viewBox="0 0 24 24">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>

              <button class="settings-item" id="btn-info">
                <svg class="icon" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10"></circle>
                  <line x1="12" y1="16" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <span class="text">O aplikacji PenguinFlix</span>
                <svg class="chevron" viewBox="0 0 24 24">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
            </div>

          </div>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-maintab="movies">
      <svg viewBox="0 0 24 24">
        <path
          d="M18,4L20,8H17L15,4H13L15,8H12L10,4H8L10,8H7L5,4H4A2,2 0 0,0 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V4H18Z" />
      </svg>
      <span>Filmy</span>
    </button>
    <button class="nav-item" data-maintab="series">
      <svg viewBox="0 0 24 24">
        <path
          d="M21,3H3A2,2 0 0,0 1,5V17A2,2 0 0,0 3,19H8V21H16V19H21A2,2 0 0,0 23,17V5A2,2 0 0,0 21,3M21,17H3V5H21V17Z" />
      </svg>
      <span>Seriale</span>
    </button>
    <button class="nav-item" data-maintab="discover">
